<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Asoti Food Shop{% endblock %}</title>
</head>
<body>
    <header>
        <h1><a href="{% url 'pages:home' %}">Asoti Food Shop</a></h1>
        <nav>
            <a href="{% url 'pages:home' %}">Главная</a>
            <a href="{% url 'catalog:index' %}">Каталог</a>
            <a href="{% url 'pages:about' %}">О нас</a>
            <a href="{% url 'pages:contacts' %}">Контакты</a>
            <a href="{% url 'pages:delivery' %}">Доставка и оплата</a>
        </nav>
        <hr>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <hr>
        <a href="{% url 'pages:privacy' %}">Политика конфиденциальности</a>
        <a href="{% url 'pages:terms' %}">Пользовательское соглашение</a>
    </footer>
</body>
</html>
